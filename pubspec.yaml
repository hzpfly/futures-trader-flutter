name: futures_trader
description: 三重滤网期货交易记录软件 - 个人投资者跨平台交易日志工具
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # 状态管理
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # 本地数据库
  drift: ^2.18.0
  sqlite3_flutter_libs: ^0.5.24
  path_provider: ^2.1.3
  path: ^1.9.0

  # 图片处理
  image_picker: ^1.1.2
  photo_view: ^0.15.0

  # 路由
  go_router: ^14.2.0

  # 图表
  fl_chart: ^0.68.0

  # 日历
  table_calendar: ^3.1.2

  # 导出
  pdf: ^3.11.1
  share_plus: ^10.1.4

  # 工具
  intl: ^0.19.0
  uuid: ^4.4.0
  collection: ^1.18.0

  # 本地通知
  flutter_local_notifications: ^17.2.2

  # UI
  cupertino_icons: ^1.0.6
  flutter_slidable: ^3.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  drift_dev: ^2.18.0
  build_runner: ^2.4.11
  riverpod_generator: ^2.4.3

flutter:
  uses-material-design: true
  assets:
    - assets/icons/
